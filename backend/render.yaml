databases:
  - name: terralink-db
    plan: free
    databaseName: terralink
    user: terralink

services:
  - type: web
    name: terralink-api
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: terralink-db
          property: connectionURI
      - key: SECRET_KEY
        generateValue: true
      - key: CORS_ORIGINS
        value: '["https://terralink-tesoreria.vercel.app"]'
